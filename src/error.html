<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>%sveltekit.error.message%</title>
		<link href="/favicon.png" rel="icon" />
		<link href="/favicon.png" rel="apple-touch-icon" />
		<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body>
		<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
			<main class="grid min-h-full place-items-center px-6 py-24 sm:py-32">
				<!-- Beispiel mit Status 404 -->
				<h1 class="text-error text-center text-4xl font-bold">%sveltekit.status%</h1>
				<div>
					<p class="text-base-content/80 mt-4 text-center text-lg">%sveltekit.error.message%</p>
					<p class="mt-10 text-center">
						<a class="btn" href="/">Go back home</a>
					</p>
				</div>
			</main>
		</div>
	</body>
</html>
