<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>%sveltekit.error.message%</title>
		<link href="/favicon.png" rel="icon" />
		<link href="/favicon.png" rel="apple-touch-icon" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body>
		<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
			<main class="grid min-h-full place-items-center px-6 py-24 sm:py-32">
				<!-- Beispiel mit Status 404 -->
				<h1 class="text-center text-4xl font-bold text-red-600">%sveltekit.status%</h1>
				<div>
					<p class="mt-4 text-center text-lg text-gray-500">%sveltekit.error.message%</p>
					<p class="mt-10 text-center">
						<a
							class="inline-flex items-center justify-center rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50"
							href="/"
							>Go back home</a
						>
					</p>
				</div>
			</main>
		</div>
	</body>
</html>
